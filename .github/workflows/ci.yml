name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Unit tests (stdlib only — no install needed)
        run: python -m unittest discover -s tests -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pipx install ruff || pip install ruff
      - name: Ruff
        run: ruff check zotvault tests
      - name: Enforce stdlib-only (no third-party imports in zotvault/)
        run: python scripts/check_stdlib_only.py
