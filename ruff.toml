target-version = "py39"
line-length = 110

[lint]
# Deliberately no "UP" (pyupgrade): the codebase's .format()/typing.Dict style
# is a conscious py3.9-era choice; churning 300 call sites buys nothing.
select = ["E", "F", "W", "I", "B"]
ignore = [
    "E501",   # line length handled loosely
    "B008",
]

[lint.per-file-ignores]
"tests/*" = ["E402"]
